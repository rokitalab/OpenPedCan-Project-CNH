name: Build

permissions:
  contents: read

on:
  pull_request:

jobs:
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Remove unused Docker images
        run: docker system prune -af
      - name: Clean up temporary files
        run: sudo rm -rf /tmp/*

  build_only:
    name: Build Docker Image (registry cache, no push)
    runs-on: ubuntu-latest
    needs: cleanup
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx (container driver)
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: pgc-images.sbgenomics.com/rokita-lab/openpedcanverse
          tags: |
            type=ref,event=pr
            type=raw,value=analysisjob

      - name: Login to CAVATICA registry
        uses: docker/login-action@v3
        with:
          registry: pgc-images.sbgenomics.com
          username: ${{ secrets.CAVATICA_USERNAME }}
          password: ${{ secrets.CAVATICA_TOKEN }}

      - name: Build (use registry cache; no push)
        uses: docker/build-push-action@v3
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=pgc-images.sbgenomics.com/rokita-lab/openpedcanverse:cache
          cache-to:   type=registry,ref=pgc-images.sbgenomics.com/rokita-lab/openpedcanverse:cache,mode=max
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}
