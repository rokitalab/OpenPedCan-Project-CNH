name: Build and Push

on:
  push:
    branches:
      - 'dev'
    paths:
      - 'Dockerfile'

jobs:
  build_and_publish_image:
    name: Build and Publish Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker meta (openpedcanverse-top)
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: pgc-images.sbgenomics.com/rokita-lab/openpedcanverse-top
          tags: |
            # Latest tag on default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Date tag (UTC) e.g. 2025-12-01
            type=datetime,pattern=YYYY-MM-DD

      - name: Login to Cavatica Registry
        uses: docker/login-action@v2
        with:
          registry: pgc-images.sbgenomics.com
          username: ${{ secrets.CAVATICA_USERNAME }}
          password: ${{ secrets.CAVATICA_TOKEN }}

      - name: Build and push openpedcanverse-top
        uses: docker/build-push-action@v3
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}
