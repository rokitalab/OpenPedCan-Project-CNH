name: Build and Push

on:
  push:
    branches:
      - 'dev'
    paths:
      - 'Dockerfile'

jobs:
  build_and_publish_image:
    name: Build and Publish Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Free disk space (pre-build)
        run: |
          echo "Disk usage before cleanup:" && df -h
          # Remove pre-installed tools and caches that are rarely needed
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          # Clean apt cache
          sudo apt-get clean || true
          # Docker cleanup
          docker system prune -af || true
          echo "Disk usage after cleanup:" && df -h

      - name: Set EST date tag
        run: echo "EST_DATE=$(TZ=America/New_York date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0

      - name: Docker meta (openpedcanverse)
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf #v6.0.0
        with:
          images: pgc-images.sbgenomics.com/rokita-lab/openpedcanverse
          tags: |
            # Latest tag on default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Date tag (EST) e.g. 2025-12-01
            type=raw,value=est-${{ env.EST_DATE }}

      - name: Login to Cavatica Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4.1.0
        with:
          registry: pgc-images.sbgenomics.com
          username: ${{ secrets.CAVATICA_USERNAME }}
          password: ${{ secrets.CAVATICA_TOKEN }}

      - name: Build and push openpedcanverse
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f #v7.1.0
        with:
          context: .
          file: Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Free disk space (post-build)
        run: |
          echo "Disk usage before post-build cleanup:" && df -h
          # Remove Buildx builder cache
          docker buildx prune -af || true
          # Comprehensive Docker cleanup
          docker system prune -af --volumes || true
          echo "Disk usage after post-build cleanup:" && df -h
